apiVersion: apps/v1
kind: Deployment
metadata:
  name: instadeploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: insta
  template:
    metadata:
      labels:
        app: insta
    spec:
      containers:
      - name: insta-cont
        image: rajeshtutta123/instagram:latest
        ports:
        - containerPort: 5000
